        <script>
            (function() {
                function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
                }

                function initCarousel(carousel) {
                const images = Array.from(carousel.querySelectorAll('img'));
                let currentIndex = 0;

                shuffleArray(images).forEach(img => carousel.appendChild(img));

                const shuffled = Array.from(carousel.querySelectorAll('img'));
                shuffled[0].classList.add('active');

                function changeImage() {
                    shuffled[currentIndex].classList.remove('active');
                    currentIndex = (currentIndex + 1) % shuffled.length;
                    shuffled[currentIndex].classList.add('active');
                }

                setTimeout(() => {
                    changeImage();
                    setInterval(changeImage, 3000);
                }, 1500);
                }

                // Initialises every .carousel on the page automatically
                document.querySelectorAll('.carousel').forEach(initCarousel);

            })();
        </script>
