              as="font"

              crossorigin>

              href="/fonts/SourceSans3-Regular.woff2"

        <style>
            .home-carousel-wrapper {
                width: 100%;
                padding: 2rem 0;
                display: flex;
                justify-content: center;
            }

            .home-carousel {
                position: relative;
                width: 80vw;
                max-height: 70vh;
            }

            .carousel-img {
                width: 80vw;
                height: auto;
                max-height: 70vh;
                object-fit: cover;
                border-radius: 8px;
                display: block;
                position: absolute;
                top: 0;
                left: 0;
                opacity: 0;
                transition: opacity 1s ease-in-out;
            }

            .carousel-img.active {
                opacity: 1;
                position: relative;
            }
        </style>
    </head>
    <body>
        <div class="header-container">
            <a class="header-logo-link" href="./index.html">xkpfoto</a>
            <button class="mobile-menu-btn" id="menu-toggle" aria-label="Open Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links" id="nav-list">
                <li><a class="nav-link nav-item" href="./index.html">HOME</a></li>      
                <li><a class="nav-link nav-item" href="./pages/football.html">FOOTBALL</a></li>
                <li><a class="nav-link nav-item" href="./pages/basketball.html">BASKETBALL</a></li>
                <li><div class="dropdown-container" id="servicesDropdown">
                    <a href="#" class="nav-link">CONTACT ▾</a>
                    <div class="dropdown-menu">
                        <div class="dropdown-content">
                            <a href="mailto:harys.karanikolos@gmail.com">Email</a>
                            <a href="https://www.instagram.com/xkpfoto/" target="_blank" rel="noopener noreferrer">Instagram</a>
                        </div> 
                    </div>
                </div></li>
            </ul>
        </div>
        <div class="home-carousel-wrapper">
          <div id="home-carousel" class="home-carousel"></div>
        </div>

        <script src="/js/football/champions/gallery.js"></script>
        
        <div class="sports-categories content">
            <div class="football-container container">
                <a href="./pages/football.html">
                    <picture>
                        <!-- Image for mobile -->
                        <source srcset="/jpg/assets/champions-mobile-menu.webp" media="(max-width: 900px)" class="image">
                        <!-- Image for desktop -->
                        <source srcset="/jpg/assets/champions-desktop.webp" media="(min-width: 899px)" class="image">
                        <!-- Fallback (for browsers that don’t support <picture>) -->
                        <img src="/jpg/assets/champions-mobile-menu.webp" alt="Responsive image" class="image">
                    </picture>
                    <div class="overlay">
                        <div class="football-text">Football</div>
                    </div>
                </a>
            </div>

            <div class="basketball-container container">
                <a href="./pages/basketball.html">
                    <picture>
                        <!-- Image for mobile -->
                        <source srcset="/jpg/assets/champions-mobile-menu.webp" media="(max-width: 900px)" class="image">
                        <!-- Image for desktop -->
                        <source srcset="/jpg/assets/champions-desktop.webp" media="(min-width: 899px)" class="image">
                        <!-- Fallback (for browsers that don’t support <picture>) -->
                        <img src="/jpg/assets/champions-mobile-menu.webp" alt="Responsive image" class="image">
                    </picture>
                    <div class="overlay">
                        <div class="football-text">Basketball</div>
                    </div>
                </a>
            </div>
        </div>
        <script>
            (function() {
            function netlifyImage(src, width) {
                return `/.netlify/images?url=/${encodeURIComponent(src)}&w=${width}&fm=webp&q=90`;
            }

            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            if (typeof images === 'undefined' || !images.length) {
                console.error("No images array found for home carousel.");
                return;
            }

            const shuffled = shuffleArray([...images]);
            const carousel = document.getElementById("home-carousel");

            const imgEls = shuffled.map((src, i) => {
                const img = document.createElement("img");
                img.src = netlifyImage(src, 1600);
                img.srcset = [800, 1200, 1600, 2000]
                .map(w => `${netlifyImage(src, w)} ${w}w`)
                .join(", ");
                img.sizes = "80vw";
                img.loading = i === 0 ? "eager" : "lazy";
                img.className = "carousel-img";
                if (i === 0) img.classList.add("active");
                carousel.appendChild(img);
                return img;
            });

            let current = 0;
            const intervalMs = 4000; // time each image stays visible

            setInterval(() => {
                const next = (current + 1) % imgEls.length;
                imgEls[current].classList.remove("active");
                imgEls[next].classList.add("active");
                current = next;
            }, intervalMs);
            })();
        </script>
    </body>
</html>
